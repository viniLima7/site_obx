<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site OBX</title>
    <link rel="stylesheet" href="styles.css ">
</head>
<body>
    <header>
        <div class="imagem_obx"><img src="imagem/logo_obx.webp" alt="Imagem OBX"></div>

        <form>
            <input type="search" class="barra_pesquisa" id="pesquisa" name="pesquisa" placeholder="Buscar produto..." required="required">
            
            <select name="opicao_estado" class="opicao padrao_botao" id="opicao_estado">
                <option value="sc">SC</option>
                <option value="sp">SP</option>
                <option value="ba">BA</option>
            </select>

            <input type="submit" class="botao padrao_botao" id="botao_envio">
        </form>
    </header>

    <main>
        <section class="sessao_cartaz">
            <div class="certaz">
                <img src="imagem/imagem_ps5.webp" alt="Imagem Ps5">

                <div class="textos_cartaz">
                    <h1 class="texto_promocional">10% off + 3x Sem Juros!</h1>
                    <p class="texto_cupom">Use o cupom</p>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
